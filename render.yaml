services:
  # ─── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: ien-backend
    runtime: docker
    rootDir: back
    dockerfilePath: Dockerfile
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CRON_API_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true

  # ─── Frontend (Static Site) ───────────────────────────────────────────────
  - type: static_site
    name: ien-frontend
    rootDir: frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: /api
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ien-backend.onrender.com/api/*
    autoDeploy: true
